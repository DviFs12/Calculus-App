<!DOCTYPE html>
<html lang="pt-BR" data-base="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Apostila — ∂ Calculus</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;1,9..144,300&family=JetBrains+Mono:wght@400;500;700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/shared.css">
<style>
.apostila-wrap { padding: 36px 44px; max-width: 800px; }

.print-btn {
  display: inline-flex; align-items: center; gap: 7px;
  background: var(--ink); color: var(--paper);
  border: none; border-radius: 9px; padding: 9px 18px;
  font-size: 0.83rem; font-weight: 600; cursor: pointer;
  font-family: 'Plus Jakarta Sans', sans-serif;
  transition: opacity 0.15s; margin-bottom: 26px;
}
.print-btn:hover { opacity: 0.85; }

.toc {
  background: var(--card-bg); border: 1px solid var(--line);
  border-radius: 12px; padding: 16px 20px; margin-bottom: 28px;
}
.toc-title { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 1px; color: var(--ink3); font-weight: 600; margin-bottom: 10px; }
.toc a { display: block; font-size: 0.83rem; color: var(--accent2); text-decoration: none; padding: 2px 0; }
.toc a:hover { text-decoration: underline; }
.toc-unit { font-weight: 600; margin-top: 6px; }
.toc-lesson { padding-left: 14px; opacity: 0.85; }

.ap-unit-title {
  font-family: 'Fraunces', serif; font-size: 1.3rem; font-weight: 700;
  margin: 32px 0 4px; color: var(--accent);
  display: flex; align-items: center; gap: 8px;
  border-bottom: 2px solid var(--accent); padding-bottom: 6px;
}
.ap-lesson-title {
  font-size: 1rem; font-weight: 700; margin: 22px 0 12px;
  color: var(--ink); padding-bottom: 5px;
  border-bottom: 1px solid var(--line);
}
.ap-block { margin-bottom: 15px; }
.ap-block h3 { font-size: 0.8rem; font-weight: 600; color: var(--ink3); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
.ap-block p  { font-size: 0.9rem; color: var(--ink2); line-height: 1.8; font-weight: 300; }
.ap-block p strong { font-weight: 600; color: var(--ink); }

@media (max-width: 768px) {
  .apostila-wrap { padding: 18px 14px; }
}

@media print {
  .topbar, .bottom-nav, .print-btn { display: none !important; }
  .apostila-wrap { padding: 0; max-width: 100%; }
  body { padding-bottom: 0 !important; }
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-left">
    <a href="index.html" class="brand-link"><span class="sym">&#8706;</span> Calculus</a>
    <div class="topbar-breadcrumb">
      <span class="crumb-sep">&#8250;</span>
      <span class="crumb-active">Apostila</span>
    </div>
  </div>
  <div class="topbar-right">
    <div class="pill pill-xp">&#9733; <span id="xp-val">0</span></div>
    <button class="icon-btn" onclick="window.print()" title="Imprimir">&#128424;</button>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav" aria-label="Navegacao principal">
  <div class="bottom-nav-inner">
    <button class="bnav-item" onclick="location.href='index.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Inicio
    </button>
    <button class="bnav-item" onclick="location.href='course.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
      Curso
    </button>
    <button class="bnav-item active" onclick="location.href='apostila.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      Apostila
    </button>
    <button class="bnav-item" onclick="location.href='store.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      Loja
    </button>
  </div>
</nav>

<!-- APOSTILA CONTENT -->
<main style="min-height:calc(100vh - 54px);">
  <div class="apostila-wrap">
    <h1 class="page-title">Apostila do Curso</h1>
    <p class="page-sub">Todo o conteúdo teórico reunido, organizado por tópicos. Clique em um tópico para ir direto.</p>
    <button class="print-btn" onclick="window.print()">&#128424; Imprimir / Salvar PDF</button>

    <div class="toc" id="toc">
      <div class="toc-title">Índice</div>
      <div id="toc-links"></div>
    </div>

    <div id="apostila-body"></div>
  </div>
</main>

<script src="js/shared.js"></script>
<script>
let STATE = loadState();
if (STATE.activeTheme) applyTheme(STATE.activeTheme);
document.getElementById('xp-val').textContent = STATE.xp;

async function buildApostila() {
  const CURRICULUM = await loadCurriculum();
  const tocLinks = document.getElementById('toc-links');
  const body     = document.getElementById('apostila-body');
  tocLinks.innerHTML = ''; body.innerHTML = '';

  CURRICULUM.forEach(unit => {
    const uid = 'ap-' + unit.id;

    // TOC entry
    const ua = document.createElement('a');
    ua.href = '#' + uid; ua.className = 'toc-unit';
    ua.textContent = unit.title;
    tocLinks.appendChild(ua);
    unit.lessons.forEach(les => {
      const la = document.createElement('a');
      la.href = '#ap-' + les.id; la.className = 'toc-lesson';
      la.textContent = les.title;
      tocLinks.appendChild(la);
    });

    // Unit header
    const uTitle = document.createElement('div');
    uTitle.className = 'ap-unit-title'; uTitle.id = uid;
    uTitle.textContent = unit.title;
    body.appendChild(uTitle);

    unit.lessons.forEach(les => {
      const lTitle = document.createElement('div');
      lTitle.className = 'ap-lesson-title'; lTitle.id = 'ap-' + les.id;
      lTitle.textContent = les.title;
      body.appendChild(lTitle);

      les.steps.forEach(step => {
        if (step.type !== 'theory') return;
        step.blocks.forEach(b => {
          if (b.type === 'para') {
            const wrap = document.createElement('div'); wrap.className = 'ap-block';
            if (b.heading) { const h = document.createElement('h3'); h.textContent = b.heading; wrap.appendChild(h); }
            const p = document.createElement('p'); p.innerHTML = b.text; wrap.appendChild(p);
            body.appendChild(wrap);
          } else if (b.type === 'formula') {
            const box = document.createElement('div'); box.className = 'formula-box'; box.style.margin = '10px 0'; box.textContent = b.text;
            body.appendChild(box);
          } else if (b.type === 'callout') {
            const c = document.createElement('div');
            c.className = 'callout ' + (b.kind==='warn'?'warn':b.kind==='tip'?'tip':'');
            const icon = b.kind==='warn'?'&#9888;':b.kind==='tip'?'&#10003;':'&#9432;';
            c.innerHTML = `<div class="callout-icon">${icon}</div><div class="callout-text">${b.text}</div>`;
            body.appendChild(c);
          } else if (b.type === 'example') {
            const e = document.createElement('div'); e.className = 'example-box';
            e.innerHTML = `<div class="example-hdr">${b.label}</div><div class="example-body">${escH(b.body)}</div>`;
            body.appendChild(e);
          } else if (b.type === 'image') {
            const iw = document.createElement('div'); iw.className = 'img-block';
            iw.innerHTML = `<img src="${b.src}" alt="${b.alt||''}" loading="lazy"><div class="img-caption">${b.caption||''}</div>`;
            body.appendChild(iw);
          }
        });
      });
    });
  });
}

buildApostila();
</script>
</body>
</html>
